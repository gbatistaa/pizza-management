spring.application.name=pizzamanagement

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=false

app.jwt.secret=${JWT_SECRET}

spring.mail.host=${EMAIL_HOST:localhost}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USER:user}
spring.mail.password=${EMAIL_PASS:password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.level.org.flywaydb=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE